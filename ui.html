<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Inter', sans-serif; padding: 0; margin: 0; color: #333; display: flex; flex-direction: column; height: 100vh; }
    
    .header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .stat-card { background: #f5f5f5; padding: 8px; border-radius: 6px; text-align: center; }
    .stat-value { font-size: 16px; font-weight: bold; color: #18A0FB; display: block; }
    .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }

    .tabs { display: flex; border-bottom: 1px solid #eee; background: #fff; }
    .tab { 
      flex: 1; padding: 12px; text-align: center; cursor: pointer; 
      font-size: 11px; font-weight: 600; color: #888;
    }
    .tab.active { color: #18A0FB; border-bottom: 2px solid #18A0FB; }

    .content { flex: 1; overflow-y: auto; padding: 10px; background: #fcfcfc; }
    .view { display: none; }
    .view.active { display: block; }

    .list-item { 
      background: white; border: 1px solid #eee; border-radius: 6px; 
      padding: 10px; margin-bottom: 8px; display: flex; 
      justify-content: space-between; align-items: center; cursor: pointer;
    }
    .list-item:hover { border-color: #18A0FB; }
    .name { font-size: 11px; font-weight: 600; }
    .subtext { font-size: 9px; color: #999; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
    .badge-blue { background: #e8f4ff; color: #18A0FB; }
    .badge-red { background: #FFE5E5; color: #D73737; }

    .footer { padding: 15px; border-top: 1px solid #eee; background: white; display: flex; flex-direction: column; gap: 8px; }
    button { 
      width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px;
    }
    #run-btn { background: #18A0FB; color: white; }
    /* Le bouton envoyer est vert et caché par défaut */
    #send-btn { background: #1BC47D; color: white; display: none; }
    
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { font-size: 10px; color: #aaa; text-align: center; }
    .empty-state { padding: 40px 20px; text-align: center; color: #ccc; font-style: italic; font-size: 12px; }
  </style>
</head>
<body>

  <div class="header">
    <div style="font-size: 13px; font-weight: bold;">GE-DESIGN Audit</div>
    <div class="stats-grid">
      <div class="stat-card">
        <span id="total-usage" class="stat-value">0</span>
        <span class="stat-label">Composants</span>
      </div>
      <div class="stat-card">
        <span id="total-debt" class="stat-value">0</span>
        <span class="stat-label">Détachés</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-target="usage-view">UTILISATION</div>
    <div class="tab" data-target="debt-view">DETTE</div>
  </div>

  <div class="content">
    <div id="usage-view" class="view active">
      <div id="usage-list" class="empty-state">Aucun scan effectué</div>
    </div>
    <div id="debt-view" class="view">
      <div id="debt-list" class="empty-state">Aucun scan effectué</div>
    </div>
  </div>

  <div class="footer">
    <button id="run-btn">Lancer l'audit</button>
    <button id="send-btn">Envoyer au Cockpit</button>
    <div id="status">Prêt</div>
  </div>

  <script>
    const runBtn = document.getElementById('run-btn');
    const sendBtn = document.getElementById('send-btn');
    const statusDiv = document.getElementById('status');
    let lastReport = null; // Stockage du rapport pour l'envoi

    // Navigation Onglets
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.target).classList.add('active');
      };
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'AUDIT_COMPLETE') {
        lastReport = msg.payload;
        
        // Stats
        document.getElementById('total-usage').innerText = lastReport.stats.officialUsageCount;
        document.getElementById('total-debt').innerText = lastReport.stats.totalDetachedSuspects;

        // Liste Utilisation
        const uList = document.getElementById('usage-list');
        uList.innerHTML = lastReport.componentUsage.length ? '' : '<div class="empty-state">Rien trouvé</div>';
        lastReport.componentUsage.forEach(comp => {
          const div = document.createElement('div');
          div.className = 'list-item';
          div.innerHTML = `<div><div class="name">${comp.name}</div><div class="subtext">${comp.pages.length} page(s)</div></div><span class="badge badge-blue">${comp.count}</span>`;
          uList.appendChild(div);
        });

        // Liste Dette
        const dList = document.getElementById('debt-list');
        dList.innerHTML = lastReport.detachedSuspects.length ? '' : '<div class="empty-state">Aucune dette !</div>';
        lastReport.detachedSuspects.forEach(item => {
          const div = document.createElement('div');
          div.className = 'list-item';
          div.innerHTML = `<div><div class="name">${item.name}</div><div class="subtext">Page: ${item.page}</div></div><span class="badge badge-red">Focus</span>`;
          div.onclick = () => parent.postMessage({ pluginMessage: { type: 'FOCUS_NODE', id: item.id } }, '*');
          dList.appendChild(div);
        });

        statusDiv.innerText = "Scan terminé.";
        runBtn.disabled = false;
        runBtn.innerText = "Relancer le scan";
        sendBtn.style.display = 'block'; // On affiche le bouton d'envoi
      }
    };

    runBtn.onclick = () => {
      runBtn.disabled = true;
      runBtn.innerText = "Analyse...";
      parent.postMessage({ pluginMessage: { type: 'START_AUDIT' } }, '*');
    };

    // --- LOGIQUE D'ENVOI AU SERVEUR ---
    sendBtn.onclick = async () => {
      if (!lastReport) return;
      
      statusDiv.innerText = "Envoi au Cockpit...";
      sendBtn.disabled = true;

      try {
        const response = await fetch('http://localhost:5000/api/audit/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(lastReport)
        });

        if (response.ok) {
          statusDiv.innerText = "✅ Rapport archivé avec succès !";
          parent.postMessage({ pluginMessage: { type: 'NOTIFY', message: 'Audit envoyé au Cockpit !' } }, '*');
        } else {
          statusDiv.innerText = "❌ Erreur serveur (" + response.status + ")";
        }
      } catch (err) {
        statusDiv.innerText = "❌ Serveur local injoignable (Port 5000)";
      } finally {
        sendBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
