<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 15px; font-size: 12px; }
    .card { background: #f0f0f0; padding: 12px; border-radius: 6px; margin-bottom: 15px; }
    .label { color: #666; font-size: 10px; font-weight: bold; margin-bottom: 4px; }
    #fileKeyDisplay { font-family: monospace; color: #18A0FB; word-break: break-all; }
    
    .manual-box { border: 1px dashed #ccc; padding: 10px; margin-top: 10px; display: none; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 5px; border: 1px solid #ddd; }
    
    button { width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-blue { background: #18A0FB; color: white; }
    .btn-green { background: #1BC47D; color: white; display: none; }
    
    .status { margin-top: 10px; text-align: center; color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">FICHIER ACTUEL</div>
    <div id="fileName" style="font-weight: bold;">Chargement...</div>
    <div class="label" style="margin-top:10px">ID FIGMA (FILE KEY)</div>
    <div id="fileKeyDisplay">Détection en cours...</div>
    
    <div id="manualBox" class="manual-box">
      <div class="label" style="color: #f24822">Saisie manuelle nécessaire :</div>
      <input type="text" id="manualInput" placeholder="Collez le ID ici (ex: GIZQNzP...)">
      <div style="font-size: 9px; color: #888; margin-top: 4px;">Récupérez l'ID dans l'URL du fichier entre '/file/' et le nom du fichier.</div>
    </div>
  </div>

  <button id="scanBtn" class="btn-blue">Scanner le document</button>
  <button id="sendBtn" class="btn-green">Envoyer au Cockpit</button>
  <div id="status" class="status">Prêt</div>

  <script>
    let currentReport = null;
    let detectedKey = null;

    window.onmessage = (event) => {
      const { type, payload } = event.data.pluginMessage;

      if (type === 'FILE_INFO') {
        document.getElementById('fileName').innerText = payload.name;
        detectedKey = payload.fileKey;

        if (detectedKey) {
          document.getElementById('fileKeyDisplay').innerText = detectedKey;
          document.getElementById('manualBox').style.display = 'none';
        } else {
          document.getElementById('fileKeyDisplay').innerText = "❌ Non détecté";
          document.getElementById('manualBox').style.display = 'block';
        }
      }

      if (type === 'AUDIT_COMPLETE') {
        currentReport = payload;
        document.getElementById('sendBtn').style.display = 'block';
        document.getElementById('status').innerText = "✅ Scan terminé ! " + payload.annotatedNodeIds.length + " annotations.";
      }
    };

    document.getElementById('scanBtn').onclick = () => {
      const manualKey = document.getElementById('manualInput').value.trim();
      const finalKey = detectedKey || manualKey;

      if (!finalKey) {
        alert("Veuillez coller l'ID du fichier (File Key) pour continuer.");
        return;
      }

      document.getElementById('status').innerText = "Scan en cours...";
      parent.postMessage({ pluginMessage: { type: 'START_AUDIT', manualKey: finalKey } }, '*');
    };

    document.getElementById('sendBtn').onclick = async () => {
      document.getElementById('status').innerText = "Envoi...";
      try {
        const res = await fetch('http://localhost:5000/api/audit/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentReport)
        });
        if (res.ok) document.getElementById('status').innerText = "🚀 Envoyé avec succès !";
      } catch (e) {
        document.getElementById('status').innerText = "❌ Erreur serveur local";
      }
    };
  </script>
</body>
</html>
